                            enf.probabilidad.includes('Media') ? 'bg-yellow-100 text-yellow-700' : 'bg-green-100 text-green-700'
                          }`}>{enf.probabilidad}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 text-xs text-amber-800">
                    <p><strong>⚠️ Aviso:</strong> Esta información es educativa y basada en principios ayurvédicos tradicionales. No reemplaza el diagnóstico médico profesional. Consultá a un profesional de salud para cualquier condición médica.</p>
                  </div>
                </div>
              )}
            </div>

            {/* Footer */}
            <div className="fixed bottom-0 left-0 right-0 bg-white border-t p-4 space-y-2">
              {!isPremium && (
                <button onClick={() => setShowPaywall(true)} className="w-full py-3 rounded-xl font-semibold bg-gradient-to-r from-purple-500 to-indigo-600 text-white">
                  ⭐ Guardar Mi Perfil - $3.99 USD
                </button>
              )}
              {isPremium && (
                <div className="text-center text-green-600 text-sm font-medium">
                  ⭐ Premium Activo - Tu perfil está guardado
                </div>
              )}
              <button onClick={generatePDF} className="w-full py-3 rounded-xl font-semibold" style={{ backgroundColor: '#F4C430', color: '#5D4E37' }}>
                📥 Descargar mi Plan Completo
              </button>
            </div>

            {/* Paywall Modal */}
            {showPaywall && (
              <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                <div className="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl">
                  <div className="text-center">
                    <div className="text-5xl mb-4">⭐</div>
                    <h3 className="text-xl font-bold text-stone-800 mb-2">VedaBite Premium</h3>
                    <p className="text-stone-600 mb-4">Guardá tu perfil para siempre y accedé sin rehacer el test</p>
                    
                    <div className="bg-purple-50 rounded-xl p-4 mb-4">
                      <div className="text-3xl font-bold text-purple-600">$3.99 USD/mes</div>
                      <p className="text-purple-500 text-sm">Suscripción mensual</p>
                    </div>
                    
                    <ul className="text-left text-sm text-stone-600 space-y-2 mb-6">
                      <li>✅ Guardá tu perfil Dosha</li>
                      <li>✅ Accedé sin rehacer el test</li>
                      <li>✅ Actualizaciones automáticas</li>
                      <li>✅ Cancelá cuando quieras</li>
                    </ul>
                    
                    <button onClick={initPayment} disabled={processingPayment}
                      className="w-full py-3 rounded-xl font-semibold bg-gradient-to-r from-purple-500 to-indigo-600 text-white disabled:opacity-50 mb-3">
                      {processingPayment ? '⏳ Procesando...' : '💳 Pagar con Mercado Pago'}
                    </button>
                    
                    <button onClick={() => setShowPaywall(false)} className="text-stone-400 text-sm">
                      Cancelar
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      return null;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Vedabite />);
  </script>
</body>
</html>
