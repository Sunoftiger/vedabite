                            className="w-full py-3 rounded-xl font-bold text-base shadow-lg flex items-center justify-center gap-2 bg-white border-2 border-stone-200 hover:border-blue-400 transition-all">
                            <svg className="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                            Continuar con Google
                          </button>
                        </div>
                        <p className="text-stone-400 text-xs mb-3">🔒 Usamos Google para proteger tu cuenta de forma segura</p>
                      </>
                    ) : (
                      <>
                        {/* USUARIO LOGUEADO - MOSTRAR INFO */}
                        <div className="bg-green-50 rounded-xl p-3 mb-4 flex items-center gap-3 border border-green-200">
                          <img src={user.photoURL} alt="" className="w-10 h-10 rounded-full" />
                          <div className="text-left">
                            <p className="font-semibold text-stone-800 text-sm">{user.displayName}</p>
                            <p className="text-stone-500 text-xs">{user.email}</p>
                          </div>
                          <span className="ml-auto text-green-500">✓</span>
                        </div>
                        
                        {/* PRECIO PSICOLÓGICO - Kotler P2 */}
                        <div className="bg-gradient-to-br from-green-50 to-emerald-50 rounded-xl p-4 mb-4 border-2 border-green-200">
                          <p className="text-green-600 text-xs font-semibold mb-1">💰 OFERTA DE LANZAMIENTO</p>
                          <div className="text-4xl font-bold text-green-600">USD $20<span className="text-lg font-normal text-green-500">/mes</span></div>
                          <p className="text-green-500 text-xs mt-1">Precio normal: <span className="line-through">USD $39</span></p>
                        </div>
                        
                        {/* VALOR CLARO */}
                        <ul className="text-left text-sm text-stone-600 space-y-2 mb-4">
                          <li className="flex items-center gap-2">✅ <span>Tu perfil Dosha guardado</span></li>
                          <li className="flex items-center gap-2">✅ <span>14 planes personalizados</span></li>
                          <li className="flex items-center gap-2">✅ <span>Acceso inmediato sin retest</span></li>
                          <li className="flex items-center gap-2">✅ <span>Actualizaciones incluidas</span></li>
                        </ul>
                        
                        {/* URGENCIA */}
                        <p className="text-amber-600 text-xs font-semibold mb-4">⚡ Quedan pocos lugares a este precio</p>
                        
                        {/* BOTÓN VERDE */}
                        <button onClick={initPayment} disabled={processingPayment}
                          className="w-full py-4 rounded-xl font-bold text-lg shadow-lg transform hover:scale-105 transition-all mb-3"
                          style={{ backgroundColor: '#22c55e', color: 'white' }}>
                          {processingPayment ? '⏳ Procesando...' : '🎯 Obtener mi Plan Ahora'}
                        </button>
                        
                        {/* LOGOS DE CONFIANZA */}
                        <div className="bg-stone-50 rounded-xl p-3 mb-3">
                          <div className="flex items-center justify-center gap-2 mb-2">
                            <span className="text-blue-500 text-lg">🛡️</span>
                            <span className="text-sm font-semibold text-stone-700">Pago 100% Seguro</span>
                          </div>
                          <div className="flex items-center justify-center gap-4 text-xs text-stone-500">
                            <span className="flex items-center gap-1">
                              <svg className="w-4 h-4" viewBox="0 0 24 24" fill="#00AAFF"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                              Mercado Pago
                            </span>
                            <span className="flex items-center gap-1">🔐 SSL</span>
                            <span className="flex items-center gap-1">💳 Datos protegidos</span>
                          </div>
                        </div>
                        
                        {/* GARANTÍA DESTACADA */}
                        <div className="flex items-center justify-center gap-2 mb-3 text-green-600">
                          <span className="text-lg">✅</span>
                          <span className="text-sm font-medium">7 días de prueba gratis • Devolución garantizada</span>
                        </div>
                        
                        <p className="text-stone-400 text-xs mb-3">🔒 Cancelá cuando quieras desde tu cuenta de Mercado Pago</p>
                      </>
                    )}
                    
                    <button onClick={() => setShowPaywall(false)} className="text-stone-400 text-sm hover:text-stone-600">
                      Ahora no, gracias
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      return null;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Vedabite />);
  </script>
</body>
</html>
